# F-Droid reviewers will build the app from source and sign it themselves.

Categories:
  - Sports & Health

License: MIT

AuthorName: Justin Wiggleton
SourceCode: https://github.com/YOURUSER/health-activity-widget
IssueTracker: https://github.com/YOURUSER/health-activity-widget/issues

AutoName: Health Activity Widget
Summary: Visualise your Health Connect activity as a contribution calendar grid.
Description: |-
  Shows your Android Health Connect data as a GitHub-style contribution
  calendar — a 13-week grid where each cell represents one day, lighting up
  when you hit your goals (10,000 steps or any recorded exercise session).

  Days with multiple activity types show colour bands. Per-activity colour
  picker and toggles let you customise the display. The widget refreshes
  hourly and caches data on-device so it never goes blank on wake.

  All data stays on your device. No internet permission, no ads, no tracking.

RepoType: git
