# Steps to submit:
#   1. Fork https://gitlab.com/fdroid/fdroiddata
#   2. Copy this file to metadata/com.wiggleton.healthactivitywidget.yml
#   3. Update SourceCode, IssueTracker, and Repo to your actual GitHub/GitLab URL
